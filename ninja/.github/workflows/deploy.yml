name: Deploy Ride Home to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option A (default): Deploy the beautiful static companion page (self-contained, no build step)
      # This makes the root index.html + its inline everything the published site instantly.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare clean site artifact (static Ride Home companion)
        run: |
          mkdir -p _site
          cp index.html ninja-bike.jpg final-itinerary-home-v4.md _site/
          # Create .nojekyll so GitHub Pages doesn't try to run Jekyll processing
          touch _site/.nojekyll
          echo "Deploying the static companion page (root index.html) as the GitHub.io homepage"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploys ONLY the companion site:
          # - index.html (the full dark-themed Ride Home v4 driving companion with rest stop tools, 7:15 AM schedule, bike image strips, Google Maps deep links)
          # - ninja-bike.jpg (full bike photo cropped to show the entire motorcycle)
          # - final-itinerary-home-v4.md (the plan)
          # This is intentional — not the Flutter app in app/, not raw Markdown list.
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ------------------------------------------------------------
# ALTERNATIVE: Flutter web build + deploy (uncomment & adjust if you want the Dart app as the live site)
#
# - uses: subosito/flutter-action@v2
#   with:
#     flutter-version: '3.22.0'   # or latest stable
#     channel: 'stable'
# - run: |
#     cd app
#     flutter pub get
#     flutter build web --release --web-renderer canvaskit
# - uses: actions/upload-pages-artifact@v3
#   with:
#     path: 'app/build/web'
#
# Then point the upload step at app/build/web instead of '.'
# You will also want a 404.html or base href tweak for pure SPA github pages if using subpaths.
