name: Deploy Ride Home to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option A (default): Deploy the beautiful static companion page (self-contained, no build step)
      # This makes the root index.html + its inline everything the published site instantly.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare clean site artifact (only the companion page + assets)
        run: |
          mkdir -p _site
          cp index.html ninja-bike.jpg final-itinerary-home-v4.md _site/
          # Optionally include the plan markdown and any other static assets you want publicly visible

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This deploys a minimal site: the beautiful static Ride Home companion
          # (with the cropped Ninja bike image at the bottom of sections)
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

