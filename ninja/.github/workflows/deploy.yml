name: Deploy Ride Home to GitHub Pages

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option A (default): Deploy the beautiful static companion page (self-contained, no build step)
      # This makes the root index.html + its inline everything the published site instantly.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (static index.html as the site)
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the root index.html (Ride Home v4 companion) as the github.io entry
          # If you prefer the Flutter web build instead, change the path below to 'app/build/web' after running flutter build web
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ------------------------------------------------------------
# ALTERNATIVE: Flutter web build + deploy (uncomment & adjust if you want the Dart app as the live site)
#
# - uses: subosito/flutter-action@v2
#   with:
#     flutter-version: '3.22.0'   # or latest stable
#     channel: 'stable'
# - run: |
#     cd app
#     flutter pub get
#     flutter build web --release --web-renderer canvaskit
# - uses: actions/upload-pages-artifact@v3
#   with:
#     path: 'app/build/web'
#
# Then point the upload step at app/build/web instead of '.'
# You will also want a 404.html or base href tweak for pure SPA github pages if using subpaths.
# ------------------------------------------------------------